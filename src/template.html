<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Just Do It!</title>
  </head>
  <body>
    <aside>
      <div class="sidebar">
        <div class="profile">User Name</div>
        <div class="tabs">
          <div class="today-btn tab-btn">Today</div>
          <div class="week-btn tab-btn">Week</div>
          <div class="month-btn tab-btn">Month</div>
          <hr>
        </div>
      </div>
    </aside>
    <main>
      <div class="main-title"></div>
      <div class="main-content">
        <div class="today-page">
          <div>
            <div class="today-title">Today</div>
            <button class="add-task-btn">Add Task</button>
          </div>
          <div class="today-card-container card-container">

          </div>
        </div>
        <div class="week-page">
          <div>
            <div class="week-title">This Week</div>
            <button class="add-task-btn">Add Task</button>
          </div>
          <div class="week-card-container card-container">

          </div>
        </div>
        <div class="month-page">
          <div>
            <div class="month-title">This Month</div>
            <button class="add-task-btn">Add Task</button>
          </div>
          <div class="month-card-container card-container">

          </div>
        </div>
      </div>
    </main>
    <dialog class="tasks-dialog">
      <form action="">
        <div>New Task</div>
        <div class="task-title-div">
          <label for="task-title">Task Title</label>
          <input type="text" name="task-title" id="task-title">
        </div>

        <div class="task-desc-div">
          <label for="task-desc">Description</label>
          <textarea name="task-desc" id="task-desc"></textarea>
        </div>

        <div class="task-due-date-div">
          <label for="task-due-date">Due Date</label>
          <input type="date" name="due-date" id="task-due-date">
        </div>
        <div class="task-priority-div">
          <input type="radio" name="priority" id="low-priority" value="low">
          <label for="low-priority">Low</label>
          <input type="radio" name="priority" id="medium-priority" value="medium">
          <label for="medium-priority">Medium</label>
          <input type="radio" name="priority" id="high-priority" value="high">
          <label for="high-priority">High</label>
        </div>
        <div class="form-buttons">
          <button type="button" class="form-cancel-btn">Cancel</button>
          <button type="submit" class="form-submit-btn">Add Task</button>
        </div>
      </form>
    </dialog>
  </body>
</html>
